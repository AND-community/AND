name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-and-test:
    name: Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Kaynak kodu al
        uses: actions/checkout@v4

      - name: Go kur
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Bağımlılıkları indir
        run: go mod download

      - name: Derle
        run: go build ./...

      - name: Testleri çalıştır
        run: go test ./...

      - name: Statik analiz
        run: go vet ./...
